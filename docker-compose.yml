services:

  mysql:
    image: mysql:8.0
    container_name: banco_de_dados
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: petcare_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: apppass123

    ports:
      - "3306:3306"

    volumes:                              
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d 

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5000:5000"

    depends_on:
      mysql:
        condition: service_healthy

  chatbot:
    build: ./chatbot
    container_name: chatbot_rasa
    restart: unless-stopped

    ports:
      - "5005:5005"  

    volumes:
      - ./chatbot:/app

    depends_on:
      - backend

volumes:
  mysql_data: