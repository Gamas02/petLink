version: "3.1"

# ──────────────────────────────────────────────────────────────
#  INTENTS
# ──────────────────────────────────────────────────────────────
intents:
  - greet
  - iniciar_denuncia
  - informar_anonimato
  - informar_tipo
  - informar_descricao
  - informar_local
  - informar_data
  - confirmar
  - negar
  - ajuda
  - sair

# ──────────────────────────────────────────────────────────────
#  ENTITIES
# ──────────────────────────────────────────────────────────────
entities:
  - anonima
  - tipo_denuncia
  - descricao
  - local
  - data_ocorrencia

# ──────────────────────────────────────────────────────────────
#  SLOTS
# ──────────────────────────────────────────────────────────────
slots:

  anonima:
    type: categorical
    values:
      - "sim"
      - "nao"
    mappings:
      - type: from_intent
        intent: confirmar
        value: "sim"
        conditions:
          - active_loop: denuncia_form
            requested_slot: anonima

      - type: from_intent
        intent: negar
        value: "nao"
        conditions:
          - active_loop: denuncia_form
            requested_slot: anonima

      - type: from_text
        conditions:
          - active_loop: denuncia_form
            requested_slot: anonima

  tipo_denuncia:
    type: categorical
    values:
      - abandono
      - "agressão"
      - "negligência"
      - outro
    mappings:
      - type: from_entity
        entity: tipo_denuncia
        conditions:
          - active_loop: denuncia_form
            requested_slot: tipo_denuncia

      - type: from_text
        conditions:
          - active_loop: denuncia_form
            requested_slot: tipo_denuncia

  descricao:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: denuncia_form
            requested_slot: descricao

  local:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: denuncia_form
            requested_slot: local

  data_ocorrencia:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: denuncia_form
            requested_slot: data_ocorrencia

  id_usuario:
    type: text
    mappings:
      - type: custom

  denuncia_confirmada:
    type: bool
    mappings:
      - type: custom

# ──────────────────────────────────────────────────────────────
#  RESPONSES
# ──────────────────────────────────────────────────────────────
responses:

  utter_greet:
    - text: |
        Olá! 🐾 Sou o assistente de denúncias do *PetLink*.
        Estou aqui para te ajudar a registrar ocorrências de maus-tratos a animais.

        Digite *denunciar* para começar, ou *ajuda* se tiver dúvidas.

  utter_ajuda:
    - text: |
        ℹ️ *Como funciona o chatbot de denúncias:*

        1️⃣ Você informa se quer ser anônimo
        2️⃣ Escolhe o tipo de ocorrência
        3️⃣ Descreve o que aconteceu
        4️⃣ Informa o local (se souber)
        5️⃣ Informa a data (se souber)
        6️⃣ Confirma o envio

        Sua denúncia é registrada e nossa equipe analisa em breve.
        Nenhuma informação pessoal é obrigatória se optar por ser anônimo.

        Digite *denunciar* para começar!

  utter_ask_anonima:
    - text: |
        Você deseja fazer a denúncia de forma *anônima*?

        🔒 *Sim* — seus dados não serão vinculados à denúncia
        👤 *Não* — a denúncia ficará associada ao seu perfil

        Responda *sim* ou *não*:

  utter_ask_tipo_denuncia:
    - text: |
        Qual é o tipo de ocorrência?

        1️⃣ *Abandono* — animal deixado sem cuidados ou em local inapropriado
        2️⃣ *Agressão* — animal sendo agredido fisicamente
        3️⃣ *Negligência* — falta de alimentação, água, abrigo ou cuidados veterinários
        4️⃣ *Outro* — outros tipos de maus-tratos

        Responda com o número ou o nome:

  utter_ask_descricao:
    - text: |
        ✍️ Descreva com detalhes o que você presenciou ou sabe sobre a situação.

        Quanto mais informações você fornecer, melhor nossa equipe poderá agir.
        (mínimo: 10 caracteres)

  utter_ask_local:
    - text: |
        📍 Você sabe o endereço ou local onde aconteceu?

        Informe o endereço, ponto de referência ou descrição do local.
        Se não souber, responda *não sei*.

  utter_ask_data_ocorrencia:
    - text: |
        📅 Quando ocorreu? Informe a data e hora.

        Exemplos: *03/05/2026 14:30* ou *ontem de manhã*
        Se não souber, responda *não sei*.

  utter_resumo_denuncia:
    - text: "Gerando resumo da sua denúncia..."

  utter_denuncia_registrada:
    - text: |
        ✅ *Denúncia registrada com sucesso!*

        Nossa equipe irá analisar sua denúncia em breve.
        Obrigado por ajudar a proteger os animais! 🐾

  utter_denuncia_cancelada:
    - text: |
        ❌ Denúncia cancelada.

        Se quiser registrar uma nova denúncia, é só digitar *denunciar*.

  utter_erro_banco:
    - text: |
        ⚠️ Ocorreu um erro ao salvar sua denúncia. Por favor, tente novamente.
        Se o problema persistir, entre em contato com o suporte.

  utter_sair:
    - text: |
        Até logo! 🐾 Se precisar registrar uma denúncia, estamos aqui.

  utter_fallback:
    - text: |
        Não entendi bem o que você quis dizer. 😕

        Você pode digitar *denunciar* para registrar uma ocorrência
        ou *ajuda* para ver as opções disponíveis.

# ──────────────────────────────────────────────────────────────
#  FORMS
# ──────────────────────────────────────────────────────────────
forms:

  denuncia_form:
    required_slots:
      - anonima
      - tipo_denuncia
      - descricao
      - local
      - data_ocorrencia

# ──────────────────────────────────────────────────────────────
#  ACTIONS
# ──────────────────────────────────────────────────────────────
actions:
  - action_salvar_denuncia
  - action_mostrar_resumo
  - validate_denuncia_form

# ──────────────────────────────────────────────────────────────
#  SESSION
# ──────────────────────────────────────────────────────────────
session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: false