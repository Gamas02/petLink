version: "3.1"

rules:

# ──────────────────────────────────────────────────────────────
#  Saudação sempre responde
# ──────────────────────────────────────────────────────────────
- rule: Responder saudação
  steps:
    - intent: greet
    - action: utter_greet

# ──────────────────────────────────────────────────────────────
#  Ajuda sempre responde (inclusive dentro do form)
# ──────────────────────────────────────────────────────────────
- rule: Responder ajuda
  steps:
    - intent: ajuda
    - action: utter_ajuda

# ──────────────────────────────────────────────────────────────
#  Sair sempre encerra
# ──────────────────────────────────────────────────────────────
- rule: Encerrar conversa
  steps:
    - intent: sair
    - action: utter_sair

# ──────────────────────────────────────────────────────────────
#  Ativar o formulário ao pedir denúncia
# ──────────────────────────────────────────────────────────────
- rule: Iniciar formulário de denúncia
  steps:
    - intent: iniciar_denuncia
    - action: denuncia_form
    - active_loop: denuncia_form

# ──────────────────────────────────────────────────────────────
#  Quando o formulário termina → mostrar resumo
# ──────────────────────────────────────────────────────────────
- rule: Exibir resumo ao completar o formulário
  condition:
    - active_loop: denuncia_form
  steps:
    - action: denuncia_form
    - active_loop: null
    - slot_was_set:
        - requested_slot: null
    - action: action_mostrar_resumo

# ──────────────────────────────────────────────────────────────
#  Usuário confirma → salvar denúncia
# ──────────────────────────────────────────────────────────────
- rule: Salvar denúncia após confirmação
  steps:
    - intent: confirmar
    - action: action_salvar_denuncia

# ──────────────────────────────────────────────────────────────
#  Usuário nega → cancelar
# ──────────────────────────────────────────────────────────────
- rule: Cancelar denúncia
  steps:
    - intent: negar
    - action: utter_denuncia_cancelada

# ──────────────────────────────────────────────────────────────
#  Fallback
# ──────────────────────────────────────────────────────────────
- rule: Fallback para mensagens não entendidas
  steps:
    - intent: nlu_fallback
    - action: utter_fallback
