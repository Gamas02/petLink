services:

  mysql:
    image: mysql:8.0
    container_name: banco_de_dados
    restart: unless-stopped

    env_file:
      - .env

    environment:                          # era "enviroment" (typo)
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "3306:3306"

    volumes:                              # era "volume" (singular)
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d  # era ./mysql/init

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped

    env_file:
      - .env

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "5000:5000"

    depends_on:
      mysql:
        condition: service_healthy

  chatbot:
    build: ./chatbot
    container_name: chatbot_rasa
    restart: unless-stopped

    ports:
      - "5005:5005"   # API REST do Rasa

    volumes:
      - ./chatbot:/app

    depends_on:
      - backend

volumes:
  mysql_data: